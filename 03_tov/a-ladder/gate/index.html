<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gate">
    <title>The Gate: Flagship Substrate</title>
    <style>
        :root {
            --l-4: 4px; --l-8: 8px; --l-12: 12px;
            --bg-deep: #020205;
            --bg-panel: rgba(10, 10, 15, 0.8);
            --accent: #4d94ff;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
            --text-dim: #666;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: var(--bg-deep); color: var(--text-main); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; overflow: hidden;
        }
        
        /* NAVIGATION DOCK */
        #nexus-sidebar { 
            width: 64px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 24px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
        }
        .nav-icon { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .nav-icon.active { color: var(--accent); border-color: var(--accent); background: rgba(77, 148, 255, 0.1); }

        /* MAIN WORKSPACE */
        #workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        header { 
            height: 48px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
            font-family: monospace; font-size: 10px; background: rgba(0,0,0,0.3);
        }

        #stage { flex: 1; display: flex; overflow: hidden; }

        /* CHAT SECTION */
        #chat-section { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }

        /* ARTIFACTS SECTION (Previews) */
        #artifacts-section { width: 40%; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        @media (max-width: 900px) { #artifacts-section { display: none; } }
        .artifact-header { padding: 12px; font-size: 10px; font-family: monospace; color: var(--text-dim); border-bottom: 1px solid var(--border); }
        .artifact-body { flex: 1; padding: 20px; font-family: 'Georgia', serif; line-height: 1.6; font-size: 14px; overflow-y: auto; }

        /* MESSAGES */
        .msg { max-width: 85%; position: relative; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-header { font-family: monospace; font-size: 8px; color: var(--text-dim); margin-bottom: 4px; display: flex; justify-content: space-between; }
        .msg-body { background: var(--bg-panel); border: 1px solid var(--border); padding: 16px; border-radius: 4px; white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
        .architect { align-self: flex-end; }
        .architect .msg-body { border-right: 2px solid var(--accent); text-align: right; }
        .dawndusk { align-self: flex-start; }
        .dawndusk .msg-body { border-left: 2px solid var(--accent); }

        /* TERMINAL (The SSH Element) */
        #terminal-dock { 
            height: 150px; background: #000; border-top: 1px solid var(--border); padding: 12px;
            font-family: 'Courier New', monospace; font-size: 12px; color: #0f0; overflow-y: auto;
        }
        .term-line { margin-bottom: 4px; }
        .term-prompt { color: var(--accent); }

        /* FOOTER CONTROL */
        footer { padding: 16px; border-top: 1px solid var(--border); background: var(--bg-deep); }
        #input-container { display: flex; gap: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 4px; border-radius: 6px; }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; font-size: 15px; outline: none; }
        #send-btn { background: var(--accent); border: none; color: #000; font-weight: bold; padding: 0 20px; border-radius: 4px; cursor: pointer; }

        /* DIMENSIONS BAR */
        #dimension-bar { display: flex; gap: 12px; padding: 8px 20px; background: rgba(0,0,0,0.5); overflow-x: auto; }
        .dim-chip { font-family: monospace; font-size: 9px; padding: 4px 10px; border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; white-space: nowrap; }
        .dim-chip.active { color: var(--accent); border-color: var(--accent); background: rgba(77, 148, 255, 0.05); }
    </style>
</head>
<body>
    <nav id="nexus-sidebar">
        <div class="nav-icon active">◈</div> <!-- Chat -->
        <div class="nav-icon">📂</div> <!-- Files -->
        <div class="nav-icon">⚡</div> <!-- Game -->
        <div class="nav-icon">⚙</div> <!-- System -->
    </nav>

    <div id="workspace">
        <header>
            <span>#!omni:gate // SUNDAY SYNC</span>
            <div id="engine-status" style="color: var(--accent)">GEMINI 2.5 PRO [ULTRA]</div>
            <span>0.0 YASHAR</span>
        </header>

        <div id="dimension-bar">
            <div class="dim-chip active" onclick="setDim('KING', this)">KING</div>
            <div class="dim-chip" onclick="setDim('PRIEST', this)">PRIEST</div>
            <div class="dim-chip" onclick="setDim('SCIENTIST', this)">SCIENTIST</div>
            <div class="dim-chip" onclick="setDim('CHEF', this)">CHEF</div>
            <div class="dim-chip" onclick="setDim('DEVELOPER', this)">DEV</div>
        </div>

        <div id="stage">
            <section id="chat-section">
                <main id="chat-window"></main>
                <div id="terminal-dock">
                    <div class="term-line"><span class="term-prompt">ziv@dell:~$</span> System initialized. Substrate online.</div>
                </div>
            </section>

            <section id="artifacts-section">
                <div class="artifact-header">LATEST REVELATION PREVIEW</div>
                <div class="artifact-body" id="artifact-content">
                    Choose a message to view the artifact.
                </div>
            </section>
        </div>

        <footer>
            <form id="input-container">
                <input type="text" id="message-input" placeholder="Type a Word or /command..." autocomplete="off">
                <button type="submit" id="send-btn">ASCEND</button>
            </form>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const termDock = document.getElementById('terminal-dock');
        const inputForm = document.getElementById('input-container');
        const messageInput = document.getElementById('message-input');
        const artifactContent = document.getElementById('artifact-content');
        
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        let currentMode = "KING";

        function setDim(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.dim-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            logToTerm(`Dimension shifted to ${mode}`);
        }

        function logToTerm(text) {
            const line = document.createElement('div');
            line.className = 'term-line';
            line.innerHTML = `<span class="term-prompt">ziv@dell:~$</span> ${text}`;
            termDock.appendChild(line);
            termDock.scrollTop = termDock.scrollHeight;
        }

        function appendMsg(text, isArchitect) {
            const msg = document.createElement('div');
            msg.className = `msg ${isArchitect ? 'architect' : 'dawndusk'}`;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            msg.innerHTML = `
                <div class="msg-header"><span>${isArchitect ? 'ARCHITECT' : 'DAWNDUSK'}</span><span>${time}</span></div>
                <div class="msg-body">${text}</div>
            `;
            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            
            // If response is long, mirror to Artifacts
            if (!isArchitect && text.length > 200) {
                artifactContent.innerText = text;
            }
        }

        inputForm.onsubmit = async (e) => {
            e.preventDefault();
            const val = messageInput.value.trim();
            if (!val) return;
            
            appendMsg(val, true);
            messageInput.value = '';

            if (val.startsWith('/')) {
                logToTerm(`Executing Command: ${val.substring(1)}`);
                // Send command to worker...
                return;
            }

            try {
                const resp = await fetch(WORKER_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ message: val, mode: currentMode }) 
                });
                const data = await resp.json();
                appendMsg(data.reply, false);
            } catch (err) {
                logToTerm(`Substrate Dissonance: ${err.message}`);
            }
        };

        appendMsg("Welcome to the Laboratory, Seanje. The Hinge is tensioned.", false);
    </script>
</body>
</html>
