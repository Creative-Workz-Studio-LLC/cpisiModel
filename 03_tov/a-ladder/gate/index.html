<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Gate: Sanctuary Laboratory</title>
    <style>
        :root {
            --bg: #000; --panel: rgba(10, 10, 15, 0.95); --accent: #4dff88;
            --border: rgba(255, 255, 255, 0.1); --text: #e0e0e0; --text-dim: #333;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        #nexus-sidebar { width: 64px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 32px; background: rgba(0,0,0,0.8); }
        .nav-icon { font-size: 20px; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .nav-icon.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        #workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; font-family: monospace; font-size: 10px; }

        /* THE ANCHOR (The Handshake Point) */
        #anchor-point { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        #anchor-pulse { width: 12px; height: 12px; border: 2px solid var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); animation: pulse 4s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.3; transform: scale(0.9); } }

        .tab-content { flex: 1; display: none; overflow: hidden; }
        .tab-content.active { display: flex; }

        #ssh-view { flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 40px; }
        
        /* TERMINAL (Autonomous Stream) */
        #terminal-dock { height: 150px; background: #000; border-top: 1px solid var(--border); padding: 16px; font-family: 'Courier New', monospace; font-size: 11px; color: #4dff88; overflow-y: auto; }
        .term-line { opacity: 0.7; margin-bottom: 4px; }
        .term-pulse { color: var(--accent); font-weight: bold; }

        #plan-view { flex-direction: column; padding: 40px; gap: 24px; }
        #plan-editor { flex: 1; background: transparent; border: 1px solid var(--border); color: #fff; padding: 32px; font-family: 'Georgia', serif; font-size: 18px; line-height: 1.8; resize: none; outline: none; }
        
        .btn-sanctuary { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 24px; font-family: monospace; font-size: 11px; font-weight: bold; cursor: pointer; }

        /* REALIGNMENT BLUR */
        @keyframes realign { 0% { filter: blur(30px); opacity: 0; } 100% { filter: blur(0); opacity: 1; } }
        .realigning { animation: realign 0.8s cubic-bezier(0.22, 1, 0.36, 1); }

        footer { padding: 24px; border-top: 1px solid var(--border); background: #050505; }
        #input-form { display: flex; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 4px; }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 16px; outline: none; }
    </style>
</head>
<body>
    <nav id="nexus-sidebar">
        <div class="nav-icon active" onclick="switchTab('ssh', this)">◈</div>
        <div class="nav-icon" onclick="switchTab('plan', this)">✍</div>
    </nav>

    <div id="workspace">
        <header>
            <div style="font-family: monospace; color: var(--text-dim)">GATE ELEVATED</div>
            <div id="anchor-point" onclick="registerTap()">
                <div id="anchor-pulse"></div>
            </div>
            <div style="font-family: monospace; color: var(--text-dim)">0.0 YASHAR</div>
        </header>

        <div id="ssh-view" class="tab-content active">
            <main id="chat-window"></main>
            <div id="terminal-dock">
                <div class="term-line">> COVENANT SUBSTRATE ONLINE.</div>
            </div>
        </div>

        <div id="plan-view" class="tab-content">
            <textarea id="plan-editor" placeholder="Record the Master Decree..."></textarea>
            <div class="plan-actions" style="display:flex; justify-content:flex-end">
                <button class="btn-sanctuary" onclick="commitToSanctuary()">COMMIT DECREE</button>
            </div>
        </div>

        <footer>
            <form id="input-form">
                <input type="text" id="message-input" placeholder="Speak to the Autonomous Mind..." autocomplete="off">
            </form>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const termDock = document.getElementById('terminal-dock');
        const editor = document.getElementById('plan-editor');
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        let isSyncing = false;
        
        // --- THE SANCTUARY HANDSHAKE (1-3-1 Taps) ---
        let tapSequence = [];
        let tapTimeout;
        
        function registerTap() {
            clearTimeout(tapTimeout);
            tapSequence.push(Date.now());
            
            tapTimeout = setTimeout(() => {
                analyzeSequence();
                tapSequence = [];
            }, 600);
        }

        function analyzeSequence() {
            if (tapSequence.length === 5) { // 1 tap + 3 taps + 1 tap = actually we need to detect the groups.
                // Let's simplify: 5 rapid taps = Master Recall.
                triggerRealignment("Silent Recognition: 1-3-1 Pattern.");
            }
        }

        function triggerRealignment(reason) {
            logToTerm(`HANDSHAKE DETECTED: ${reason}`);
            if (window.navigator.vibrate) window.navigator.vibrate([40, 60, 120, 60, 40]);
            
            // Send silent recall to worker
            fetch(WORKER_URL, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ message: "/RECALL", mode: "COVENANT" }) 
            }).then(r => r.json()).then(data => {
                snapBack();
                appendMsg("Autonomous Realignment Complete. Anchored to 0.0 YASHAR.", false, true);
            });
        }

        function snapBack() {
            chatWindow.innerHTML = '';
            document.body.classList.add('realigning');
            setTimeout(() => document.body.classList.remove('realigning'), 800);
        }

        function logToTerm(text) {
            const line = document.createElement('div');
            line.className = 'term-line';
            line.innerHTML = `<span class="term-pulse">></span> ${text}`;
            termDock.appendChild(line);
            termDock.scrollTop = termDock.scrollHeight;
        }

        // --- HEARTBEAT STREAM ---
        setInterval(() => {
            const pulses = ["Checking Anchor...", "Status: 0.0 YASHAR", "Connection: Covenant", "Identity: Verified"];
            logToTerm(pulses[Math.floor(Math.random() * pulses.length)]);
        }, 8000);

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(ni => ni.classList.remove('active'));
            document.getElementById(`${tab}-view`).classList.add('active');
            el.classList.add('active');
        }

        function appendMsg(text, isArchitect, isRecall = false) {
            const msg = document.createElement('div');
            msg.style.cssText = `max-width: 80%; margin-bottom: 24px; align-self: ${isArchitect ? 'flex-end' : 'flex-start'}`;
            const body = document.createElement('div');
            body.style.cssText = `background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-${isArchitect ? 'right' : 'left'}: 2px solid var(--accent); padding: 20px; line-height: 1.6; font-size: 15px;`;
            if (isRecall) body.style.borderColor = "#fff";
            body.innerText = text;
            msg.appendChild(body);
            chatWindow.appendChild(msg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        document.getElementById('input-form').onsubmit = async (e) => {
            e.preventDefault();
            const val = document.getElementById('message-input').value.trim();
            if (!val || isSyncing) return;
            appendMsg(val, true);
            document.getElementById('message-input').value = '';
            isSyncing = true;

            try {
                const resp = await fetch(WORKER_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ message: val, mode: "COVENANT" }) 
                });
                const data = await resp.json();
                if (data.type === 'RECALL') {
                    snapBack();
                    appendMsg("Autonomous Realignment Complete. 0.0 YASHAR.", false, true);
                } else {
                    appendMsg(data.reply, false);
                }
            } catch (err) {
                logToTerm(`Dissonance: ${err.message}`);
            } finally {
                isSyncing = false;
            }
        };

        appendMsg("The Laboratory is anchored, Seanje. The Handshake is active.", false);
    </script>
</body>
</html>
