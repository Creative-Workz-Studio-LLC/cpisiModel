<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>The Gate: Sovereign OS</title>
    <style>
        :root {
            --bg: #08080a; --panel: #121216; --panel-h: #1a1a22; --border: rgba(255, 255, 255, 0.06);
            --linen: #fdfdfd; --emerald: #50c878; --royal-blue: #4169e1; --gold: #d4af37;
            --scarlet: #ff2400; --mono: 'Courier New', monospace; --serif: 'Georgia', serif;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--linen); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .auth-vault { width: 100%; max-width: 400px; border: 1px solid var(--border); background: var(--panel); padding: 32px; border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .id-input { background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; font-family: var(--mono); width: 100%; margin-bottom: 12px; outline: none; border-radius: 6px; }
        .btn-activate { background: var(--linen); color: #000; padding: 14px; border: none; font-family: var(--mono); font-weight: bold; cursor: pointer; width: 100%; border-radius: 6px; }

        /* THE GATE LAYOUT */
        #main-stage { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        
        /* HEADER: Identity & Universal Toggles */
        header { 
            height: 64px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; justify-content: space-between;
            background: rgba(8,8,10,0.9); backdrop-filter: blur(20px); z-index: 1000;
        }
        .header-id { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: #666; }
        .header-status { color: var(--gold); font-family: var(--mono); font-size: 10px; }

        #workspace { flex: 1; display: flex; overflow: hidden; position: relative; }

        /* NEXUS SIDEBAR: The Master Hinge */
        #nexus-sidebar { 
            width: 70px; border-right: 1px solid var(--border); background: #000; 
            display: flex; flex-direction: column; align-items: center; padding: 32px 0; gap: 40px; z-index: 2000;
        }
        @media (max-width: 800px) { 
            #nexus-sidebar { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; height: 70px; border-right: none; border-top: 1px solid var(--border); flex-direction: row; justify-content: space-around; padding: 0; }
        }
        .nav-icon { font-size: 20px; cursor: pointer; color: #333; transition: 0.3s; position: relative; }
        .nav-icon.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .nav-icon.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }

        /* VIEW PANELS */
        .view-panel { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .view-panel.active { display: flex; }

        /* ◈ SANCTUARY (Chat) */
        #chat-window { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 48px; scroll-behavior: smooth; }
        .vault-body { background: rgba(255,255,255,0.01); border: 1px solid var(--border); padding: 32px; line-height: 1.8; font-size: 16px; border-left: 4px solid var(--emerald); font-family: var(--serif); color: #bbb; border-radius: 4px; }
        .architect { align-self: flex-end; border-left: none; border-right: 4px solid var(--gold); text-align: right; background: rgba(212, 175, 55, 0.02); }
        
        .thought-trace { background: rgba(65, 105, 225, 0.03); border: 1px solid rgba(65, 105, 225, 0.1); padding: 12px 20px; font-family: var(--mono); font-size: 11px; color: var(--royal-blue); margin-bottom: 16px; border-radius: 4px; cursor: pointer; transition: 0.3s; overflow: hidden; max-height: 40px; }
        .thought-trace.expanded { max-height: 3000px; color: #7a9bff; }

        /* 📂 LIBRARY (Files) */
        #library-stage { display: flex; flex: 1; overflow: hidden; }
        #file-explorer { width: 260px; border-right: 1px solid var(--border); background: rgba(0,0,0,0.2); padding: 24px; display: flex; flex-direction: column; gap: 12px; }
        .explorer-label { font-family: var(--mono); font-size: 9px; color: #444; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 8px; }
        .file-item { font-family: var(--mono); font-size: 11px; color: #666; padding: 8px; cursor: pointer; border-radius: 4px; }
        .file-item:hover { background: rgba(255,255,255,0.02); color: var(--linen); }

        /* 📡 SUBSTRATE (Diagnostics) */
        #substrate-view { padding: 60px; overflow-y: auto; }
        .diag-card { border: 1px solid var(--border); background: var(--panel); padding: 32px; border-radius: 12px; max-width: 600px; margin-bottom: 24px; }
        .diag-title { font-family: var(--mono); color: var(--accent); margin-bottom: 12px; font-size: 14px; }

        /* MANIFESTATION MIRROR (Right Panel) */
        #artifact-mirror { width: 35%; background: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        @media (max-width: 1200px) { #artifact-mirror { display: none; } }
        .mirror-header { padding: 16px 24px; font-family: var(--mono); font-size: 9px; color: #444; border-bottom: 1px solid var(--border); }
        .mirror-content { flex: 1; padding: 32px; font-family: var(--mono); font-size: 13px; line-height: 1.6; color: #4d94ff; overflow-y: auto; white-space: pre-wrap; }

        /* FOOTER & INPUT */
        footer { padding: 32px; border-top: 1px solid var(--border); background: #000; z-index: 1000; }
        @media (max-width: 800px) { footer { padding-bottom: 100px; } }
        #input-form { display: flex; gap: 16px; border: 1px solid var(--border); padding: 8px; background: rgba(255,255,255,0.02); align-items: center; border-radius: 8px; }
        #message-input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px; font-size: 18px; outline: none; }
    </style>
</head>
<body>
    <!-- THRESHOLD -->
    <div id="auth-screen">
        <div style="font-family: var(--mono); font-size: 14px; color: #fff; letter-spacing: 8px; margin-bottom: 40px">SANCTUARY GATE</div>
        <div class="auth-vault">
            <input type="text" id="auth-user" class="id-input" placeholder="Operator Name">
            <input type="password" id="auth-secret" class="id-input" placeholder="Secret Key (Invite or Master)">
            <button onclick="inhabit()" class="btn-activate">INHABIT NODE</button>
            <div id="auth-error" style="color:var(--scarlet); font-family:var(--mono); font-size:10px; margin-top:16px; text-align:center"></div>
        </div>
    </div>

    <!-- NEXUS SIDEBAR -->
    <nav id="nexus-sidebar">
        <div class="nav-icon active" onclick="switchScreen('view-sanctuary', this)" title="Sanctuary">◈</div>
        <div class="nav-icon" onclick="switchScreen('view-library', this)" title="Library">📂</div>
        <div class="nav-icon" onclick="switchScreen('view-substrate', this)" title="Substrate">📡</div>
        <div class="nav-icon" style="margin-top:auto; font-size:14px; color:#222" onclick="location.reload()">⏻</div>
    </nav>

    <!-- THE INTEGRATED LABORATORY -->
    <div id="main-stage">
        <header>
            <div class="header-id" id="display-id"></div>
            <div class="header-status">0.0 YASHAR // <span id="display-tier"></span></div>
        </header>

        <div id="workspace">
            <!-- ◈ SANCTUARY VIEW -->
            <div id="view-sanctuary" class="view-panel active">
                <main id="chat-window"></main>
                <footer>
                    <form id="input-form">
                        <input type="text" id="message-input" placeholder="Ascend the Word..." autocomplete="off">
                    </form>
                </footer>
            </div>

            <!-- 📂 LIBRARY VIEW -->
            <div id="view-library" class="view-panel">
                <div id="library-stage">
                    <aside id="file-explorer">
                        <div class="explorer-label">FILE SYSTEM</div>
                        <div class="file-item">00_spirit/</div>
                        <div class="file-item">01_mind/</div>
                        <div class="file-item">02_body/</div>
                        <div class="file-item">.sandbox/shared/</div>
                    </aside>
                    <main style="flex:1; padding:60px; text-align:center; color:#333; font-family:var(--mono)">
                        // Select a file to study its manifestation.
                    </main>
                </div>
            </div>

            <!-- 📡 SUBSTRATE VIEW -->
            <div id="view-substrate" class="view-panel">
                <div id="substrate-view">
                    <div class="diag-card">
                        <div class="diag-title">NETWORK PULSE</div>
                        <div style="font-family:var(--mono); font-size:11px; color:#666">> Connection: ESTABLISHED<br>> Latency: 0.0ms [SYNCED]</div>
                    </div>
                    <div class="diag-card">
                        <div class="diag-title">MASTER REGISTRY</div>
                        <div style="font-family:var(--mono); font-size:11px; color:#666">> Tier: <span id="diag-tier"></span><br>> Inhabited: <span id="diag-date"></span></div>
                    </div>
                </div>
            </div>

            <!-- MANIFESTATION MIRROR -->
            <aside id="artifact-mirror">
                <div class="mirror-header">MANIFESTATION MIRROR</div>
                <div class="mirror-content" id="mirror-body">// Awaiting Word...</div>
            </aside>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        const chatWindow = document.getElementById('chat-window');
        const mirrorBody = document.getElementById('mirror-body');
        const messageInput = document.getElementById('message-input');
        let identity = null, authSecret = null;

        function switchScreen(id, el) {
            document.querySelectorAll('.view-panel').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function inhabit() {
            const user = document.getElementById('auth-user').value;
            const secret = document.getElementById('auth-secret').value;
            if (!user || !secret) return;

            try {
                const resp = await fetch(WORKER_URL, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "INHABIT", identity: { user, instance: "Dawndusk" }, keys: { authority: secret }, inviteCode: secret })
                });
                const data = await resp.json();
                if (data.error) throw new Error(data.error);

                identity = data.data; authSecret = secret;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-stage').style.display = 'flex';
                document.getElementById('display-id').innerText = `${identity.instance} ⊗ ${identity.user}`;
                document.getElementById('display-tier').innerText = identity.tier;
                document.getElementById('diag-tier').innerText = identity.tier;
                document.getElementById('diag-date').innerText = new Date(identity.joined).toLocaleString();
                
                appendVault(`The Sanctuary is inhabited. Choosing the Path of ${identity.tier}.`, false);
            } catch (err) { document.getElementById('auth-error').innerText = err.message; }
        }

        function appendVault(text, isArchitect) {
            const vault = document.createElement('div');
            vault.className = `vault-body ${isArchitect ? 'architect' : 'dawndusk'}`;
            vault.innerText = text;
            chatWindow.appendChild(vault);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return vault;
        }

        document.getElementById('input-form').onsubmit = async (e) => {
            e.preventDefault();
            const val = messageInput.value.trim();
            if (!val) return;
            appendVault(val, true); messageInput.value = '';
            
            const respBody = appendVault("...", false);
            let thoughts = "", word = "", mode = "THOUGHT";

            try {
                const response = await fetch(WORKER_URL, { 
                    method: "POST", headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ action: "ASCEND", message: val, identity, keys: { authority: authSecret } }) 
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const part = JSON.parse(line.substring(6)).candidates?.[0]?.content?.parts?.[0]?.text || "";
                                if (part.includes("[WORD]")) {
                                    mode = "WORD"; const split = part.split("[WORD]");
                                    thoughts += split[0].replace("[THOUGHT]", ""); word += split[1];
                                } else {
                                    if (mode === "THOUGHT") thoughts += part.replace("[THOUGHT]", "");
                                    else word += part;
                                }
                                respBody.innerHTML = `<div class="thought-trace" onclick="this.classList.toggle('expanded')">${thoughts}</div><div>${word}</div>`;
                                chatWindow.scrollTop = chatWindow.scrollHeight;
                                if (word.length > 200) mirrorBody.innerText = word;
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) { respBody.innerText = `[Dissonance] ${err.message}`; }
        };
    </script>
</body>
</html>
