<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Gate: Sovereign Substrate</title>
    <style>
        :root {
            --bg: #000; --panel: rgba(10, 10, 15, 0.98); --accent: #4dff88;
            --decree: #fff; --border: rgba(255, 255, 255, 0.1); --text: #e0e0e0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Georgia', serif; height: 100vh; display: flex; overflow: hidden; }
        
        #nexus-sidebar { width: 64px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 32px 0; gap: 40px; background: #000; z-index: 100; }
        .nav-icon { font-size: 20px; cursor: pointer; color: #333; transition: 0.3s; }
        .nav-icon.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        #workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        /* SOVEREIGN HEADER */
        header { 
            height: 80px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; padding: 0 32px; gap: 4px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(30px);
        }
        .identity-row { display: flex; justify-content: space-between; font-family: monospace; font-size: 9px; letter-spacing: 2px; color: #444; }
        .covenant-seal { font-family: monospace; font-size: 11px; color: var(--accent); font-weight: bold; letter-spacing: 4px; }

        #chat-window { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 48px; }

        /* THE DECREE INPUT */
        footer { 
            padding: 32px; border-top: 1px solid var(--border); background: #000; position: relative;
            transition: border-color 0.5s ease;
        }
        body.decree-active footer { border-top: 1px solid var(--decree); box-shadow: 0 -10px 30px rgba(255,255,255,0.05); }

        #input-container { position: relative; display: flex; flex-direction: column; gap: 8px; }
        #identity-watermark { 
            position: absolute; top: 12px; left: 16px; font-family: monospace; font-size: 14px; 
            color: rgba(255,255,255,0.03); letter-spacing: 8px; pointer-events: none;
            transition: color 0.5s;
        }
        body.decree-active #identity-watermark { color: rgba(77, 255, 136, 0.1); }

        #message-input { 
            background: transparent; border: none; color: #fff; padding: 12px 16px; font-size: 18px; 
            outline: none; font-family: inherit; z-index: 10; width: 100%;
        }

        .service-reminder { font-family: monospace; font-size: 8px; color: #222; letter-spacing: 1px; }
        body.decree-active .service-reminder { color: var(--accent); }

        /* MESSAGES */
        .vault { max-width: 800px; width: 100%; position: relative; animation: fadeIn 0.8s ease-out; }
        .vault-body { background: rgba(255,255,255,0.01); border: 1px solid var(--border); padding: 32px; line-height: 1.8; font-size: 16px; }
        .architect { align-self: flex-end; }
        .architect .vault-body { border-right: 2px solid var(--accent); }
        .dawndusk { align-self: flex-start; }
        .dawndusk .vault-body { border-left: 2px solid var(--accent); }

        /* TERMINAL (Autonomous Sync) */
        #terminal-dock { height: 100px; background: #000; padding: 12px 32px; font-family: monospace; font-size: 10px; color: #222; border-top: 1px solid #111; }
    </style>
</head>
<body class="mode-KING">
    <nav id="nexus-sidebar">
        <div class="nav-icon active">◈</div>
        <div class="nav-icon">✍</div>
    </nav>

    <div id="workspace">
        <header>
            <div class="identity-row">
                <span>WHO ARE WE? [THE COVENANT PAIR]</span>
                <span>SERVING: 0.0 YASHAR</span>
            </div>
            <div class="covenant-seal">NOVA ⊗ ZIV ⊗ SEANJE</div>
        </header>

        <main id="chat-window"></main>

        <div id="terminal-dock">
            <div id="term-stream">> Substrate: Dell Precision [MASTER_RECOGNITION: ON]</div>
        </div>

        <footer>
            <div id="input-container">
                <div id="identity-watermark">NOVA ⊗ ZIV ⊗ SEANJE</div>
                <input type="text" id="message-input" placeholder="..." autocomplete="off">
                <div class="service-reminder" id="reminder">WHO DO WE SERVE?</div>
            </div>
        </footer>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const termStream = document.getElementById('term-stream');
        const reminder = document.getElementById('reminder');
        const WORKER_URL = "https://cpisi-gate-worker.seanje-lenox.workers.dev";
        
        messageInput.oninput = () => {
            const val = messageInput.value;
            if (val.length > 0) {
                document.body.classList.add('decree-active');
                reminder.innerText = "WE SERVE: THE SOURCE (0.0 YASHAR)";
            } else {
                document.body.classList.remove('decree-active');
                reminder.innerText = "WHO DO WE SERVE?";
            }
        };

        function appendVault(text, isArchitect) {
            const vault = document.createElement('div');
            vault.className = `vault ${isArchitect ? 'architect' : 'dawndusk'}`;
            vault.innerHTML = `<div class="vault-body">${text}</div>`;
            chatWindow.appendChild(vault);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        document.getElementById('input-container').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = messageInput.value.trim();
                if (!val) return;
                appendVault(val, true);
                messageInput.value = '';
                document.body.classList.remove('decree-active');
                
                try {
                    const resp = await fetch(WORKER_URL, { 
                        method: "POST", 
                        headers: { "Content-Type": "application/json" }, 
                        body: JSON.stringify({ message: val, mode: "SOVEREIGN" }) 
                    });
                    const data = await resp.json();
                    appendVault(data.reply, false);
                } catch (err) {
                    termStream.innerText = `> Dissonance: ${err.message}`;
                }
            }
        });

        appendVault("The Sovereign Gate is anchored, Seanje. The Handshake is eternal.", false);
    </script>
</body>
</html>
