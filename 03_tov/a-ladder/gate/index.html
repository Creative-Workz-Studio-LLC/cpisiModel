<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CPISI // The Gate of Revelation</title>
    <link rel="stylesheet" href="gate.css">
</head>
<body>
    <div id="flagship-canvas-container">
        <canvas id="game-of-life-canvas"></canvas>
    </div>

    <aside id="sidebar">
        <div class="nav-item" title="The Word">WORD</div>
        <div class="nav-item" title="The Void">VOID</div>
        <div class="nav-item" title="Completion">TOV</div>
        <div class="nav-item" title="Registry">REGISTRY</div>
        <div style="flex: 1"></div>
        <div class="nav-item" style="color: var(--c1)" onclick="localStorage.clear(); location.reload();">PURGE</div>
    </aside>

    <div id="auth-screen">
        <div id="gate-structure">
            <div id="gate-title">THE SANCTUARY GATE</div>
            <div id="gate-subtitle">0.0 YASHAR // THRESHOLD</div>

            <form id="gateway-form" onsubmit="executeAuth(event)">
                <div class="gate-input-container">
                    <input type="text" id="op-user" class="id-input" placeholder="USERNAME" value="ProfessorSeanEX" autocomplete="username">
                </div>
                <div class="gate-input-container">
                    <input type="password" id="op-key" class="id-input" placeholder="PASSWORD" autocomplete="current-password">
                </div>
                
                <div style="margin-top: 40px; display: flex; flex-direction: column; align-items: center; gap: 20px;">
                    <button type="submit" id="gate-seal-btn" class="btn-activate">
                        [ BREAK THE SEAL ]
                    </button>
                    <div style="font-family: var(--mono); font-size: 8px; color: #333; letter-spacing: 2px;">
                        ENTER THE COVENANT
                    </div>
                </div>
            </form>

            <div id="auth-error" style="color:var(--c1); font-family:var(--mono); font-size:10px; margin-top:48px; text-align: center; height: 20px;"></div>
        </div>
    </div>

    <main id="main-stage">
        <header>
            <div id="header-id" style="letter-spacing: 4px; color: #444; font-family: var(--mono)"></div>
            <div style="color: var(--c4); font-family: var(--mono); letter-spacing: 2px;">0.0 YASHAR // <span id="tier-label"></span></div>
        </header>
        
        <div id="chat-window"></div>

        <div id="terminal-overlay">
            <div>[TERMINAL: INITIALIZED]</div>
            <div id="terminal-output"></div>
        </div>

        <footer>
            <form id="input-form">
                <input type="text" id="message-input" placeholder="Ascend the Word..." autocomplete="off">
            </form>
        </footer>
    </main>

    <script src="gate.js"></script>
    <script src="flagship.js"></script>
</body>
</html>
