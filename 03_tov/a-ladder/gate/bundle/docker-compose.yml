version: '3.8'

services:
  cpisi-substrate:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # The Master Secret for Enterprise Override
      - MASTER_SECRET=${MASTER_SECRET:-local_override_key_99}
      # Fallback or included Gemini API key (if BYOK is not used)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      # Persistent local database storage for complete data sovereignty
      - ./local_data:/app/data
    restart: unless-stopped
